<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tunnel Planner</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app"></div>
    <div id="ui">
      <h2>Tunnel Planner</h2>
      <div class="stat-line">Length: <span id="stat-length">0.00 m</span></div>
      <div class="stat-line">Volume: <span id="stat-volume">0.00 m³</span></div>
      <div class="stat-line">Status: <span id="stat-status">Idle</span></div>

      <div class="button-group">
        <button id="btn-confirm">Confirm Path</button>
        <button id="btn-undo">Undo Last</button>
        <button id="btn-toggle">Toggle View</button>
      </div>
      <div class="button-group">
        <button id="btn-reset">Reset View</button>
        <button id="btn-top">Top View</button>
        <button id="btn-side">Side View</button>
      </div>

      <div class="button-group">
        <select id="btn-x" placeholder="Choose Tunnel">
          <option>Tunnel 1</option>
          <option>Tunnel 2</option>
          <option>Tunnel 3</option>
        </select>

        <select id="btn-point">
          <option value="end">End Point</option>
          <option value="start">Start Point</option>
        </select>

      <textarea id="btn-height"></textarea>
        <textarea id="btn-angle"></textarea>
        <button id="btn-update">Extend Corridor</button>
        <button id="btn-undo-corridor">Undo Corridor</button>
      </div>

      <!-- <div class="button-group">
        <button id="btn-zoom-in">Zoom In</button>
        <button id="btn-zoom-out">Zoom Out</button>
      </div> -->

      <div id="warning-text" class="warning-msg"></div>
    </div>
    <script type="module" src="./main.js"></script>
  </body>
</html>
